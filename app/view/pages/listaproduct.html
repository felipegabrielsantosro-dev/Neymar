{% extends "layouts/main.html" %}
 {% block title %}Produtos{% endblock %} 
 {%
block content %}
<div class="container-fluid py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-2">
            <i class="fa-solid fa-box fa-lg text-success"></i>
            <h4 class="mb-0 fw-semibold">Produtos</h4>
        </div>
        <button class="btn btn-success px-4"
            onclick="api.window.openModal('pages/product', { width: 900, height: 600, title: 'Cadastrar Produto' })">
            <i class="fa-solid fa-plus me-2"></i>Novo Produto
        </button>
    </div>
</div>
  <div class="row">
    <div class="col-12">
      <div class="card shadow-sm border-0">
        <div class="card-body p-0">
          <table id="table-products" class="table table-striped table-hover table-bordered mb-0 align-middle"
            style="width: 100%">
            <thead class="table-dark">
              <tr>
                <th>Código</th>
                <th>Nome</th>
                <th>Cód. barra</th>
                <th>Grupo</th>
                <th>Unidade</th>
                <th>Estq Atual</th>
                <th>Preço de compra</th>
                <th>Preço de venda</th>
                <th class="text-center">Ativo</th>
                <th class="text-center">Ações</th>
              </tr>
            </thead>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script defer type="module" src="file:///{{ assets }}/js/listaproduct.js"></script>
{% endblock %}
