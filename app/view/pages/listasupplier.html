{% extends "layouts/main.html" %}
{% block title %}Fornecedores{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-2">
            <i class="fa-solid fa-truck fa-lg text-success"></i>
            <h4 class="mb-0 fw-semibold">Fornecedores</h4>
        </div>
        <button class="btn btn-success px-4"
            onclick="api.window.openModal('pages/supplier', { width: 800, height: 500, title: 'Cadastrar Fornecedor' })">
            <i class="fa-solid fa-plus me-2"></i>Novo Fornecedor
        </button>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-3">
            <table id="table-suppliers" class="table table-striped table-hover table-bordered align-middle mb-0" style="width: 100%;">
                <thead class="table-dark">
                    <tr>
                        <th class="text-center" style="width: 60px;">#</th>
                        <th>Nome Fantasia</th>
                        <th>Razão Social</th>
                        <th>CNPJ/CPF</th>
                        <th>IE/RG</th>
                        <th class="text-center">Ativo</th>
                        <th class="text-center" style="width: 100px;">Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="file:///{{ assets }}/js/listasupplier.js"></script>
{% endblock %}
