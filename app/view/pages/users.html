{% extends "layouts/main.html" %}

{% block title %}Novo Usuário{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2>Cadastro de Usuário</h2>
    </div>
</div>

<form id="form">
    <input type="hidden" id="id" name="id">
    <input type="hidden" id="action" name="action">

    <div class="row">
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="nome" name="nome" placeholder="Nome completo" maxlength="150" required>
                <label for="nome">Nome do Usuário</label>
            </div>
        </div>

        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required>
                <label for="cpf">CPF</label>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="rg" name="rg" placeholder="RG" maxlength="20" required>
                <label for="rg">RG</label>
            </div>
        </div>

        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="senha" name="senha" placeholder="Senha" maxlength="255" required>
                <label for="senha">Senha</label>
            </div>
        </div>
    </div>

    <div class="row mt-3">
        <div class="col-12">
            <button type="button" class="btn btn-outline-success" id="insert">
                <i class="fa-solid fa-floppy-disk"></i> Salvar
            </button>
        </div>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script src="file:///{{ assets }}/js/users.js"></script>
{% endblock %}
