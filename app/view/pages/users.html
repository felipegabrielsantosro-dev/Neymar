{% extends "layouts/main.html" %}

{% block title %}Novo Usuário{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2>Cadastro de Usuário</h2>
    </div>
</div>

<form id="form">
    <input type="hidden" id="id" name="id">
    <input type="hidden" id="action" name="action">

    <div class="row">
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="nome" name="nome" placeholder="Nome completo" maxlength="150" required>
                <label for="nome">Nome do Usuário</label>
            </div>
        </div>

        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="email@example.com" maxlength="255" required>
                <label for="email">Email do Usuário</label>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="senha" name="senha" placeholder="Senha" maxlength="255" required>
                <label for="senha">Senha</label>
            </div>
        </div>

        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="number" class="form-control" id="enterprise_id" name="enterprise_id" placeholder="ID da Empresa" required>
                <label for="enterprise_id">ID da Empresa</label>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="ativo" id="ativo" value="true" checked>
                <label class="form-check-label" for="ativo">
                    Ativo?
                </label>
            </div>
        </div>
    </div>

    <div class="row mt-3">
        <div class="col-12">
            <button type="button" class="btn btn-outline-success" id="insert">
                <i class="fa-solid fa-floppy-disk"></i> Salvar
            </button>
        </div>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script src="file:///{{ assets }}/js/users.js"></script>
{% endblock %}
