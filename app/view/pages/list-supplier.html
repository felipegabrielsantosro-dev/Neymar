{% extends "layouts/main.html" %}

{% block title %}Fornecedores{% endblock %}

{% block content %}
<h2>Lista de Fornecedores</h2>

<div class="row">
    <div class="col-12 mb-2">
        <button class="btn btn-success"
            onclick="api.window.openModal('pages/supplier', { width: 900, height: 600, title: 'Cadastrar Fornecedor' })">
            <i class="fa-solid fa-plus"></i>
            Novo fornecedor
        </button>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <table id="table-supplier" class="table table-striped table-hover table-bordered" style="width: 100%;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome Fantasia</th>
                    <th>Razão Social</th>
                    <th>CNPJ</th>
                    <th>Ativo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script defer type="module" src="file:///{{ assets }}/js/list-supplier.js"></script>
{% endblock %}
