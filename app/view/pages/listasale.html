{% extends "layouts/main.html" %}
{% block title %}Vendas{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-2">
            <i class="fa-solid fa-receipt fa-lg text-success"></i>
            <h4 class="mb-0 fw-semibold">Vendas</h4>
        </div>
        <button class="btn btn-success px-4"
           onclick="api.window.open('pages/sale', { maximized: true, title: 'Cadastrar Venda' })"

            <i class="fa-solid fa-plus me-2"></i>Novo Venda
        </button>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-3">
            <table id="table-sales" class="table table-striped table-hover table-bordered align-middle mb-0" style="width: 100%;">
                <thead class="table-dark"> 
                    <tr>
                        <th class="text-center" style="width: 60px;">#</th>
                        <th><i class="fa-solid fa-user me-1"></i>id Cliente</th>
                        <th><i class="fa-solid fa-id-card me-1"></i>total_bruto</th>
                        <th><i class="fa-solid fa-fingerprint me-1"></i>total_liquido</th>
                        <th class="text-center" style="width: 100px;">desconto</th>
                        <th class="text-center" style="width: 100px;">acrescimo</th>
                        <th class="text-center" style="width: 100px;">observacao</th>
                        <th class="text-center" style="width: 180px;">Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script type="module" src="file:///{{ assets }}/js/listasale.js"></script>
{% endblock %}
